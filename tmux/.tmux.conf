# Minimal tmux configuration

# Terminal colors: 256-color with true-color (RGB) overrides
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Snappier Esc in vim/nvim
set -sg escape-time 10

# Scrollback
set -g history-limit 10000

# Number windows and panes from 1; keep numbering contiguous
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vi-style keys in copy mode
setw -g mode-keys vi

# Splits: | vertical, - horizontal, open in current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# `prefix :reload` re-sources this file in place
set -ga command-alias[100] reload='source-file ~/.tmux.conf'
